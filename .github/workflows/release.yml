name: Release

on:
  push:
    tags:
      - "v*"

# `tauri-action` calls the Releases API with the workflow's GITHUB_TOKEN.
# The default token is read-only on `contents`, so creating the draft
# release fails with "Resource not accessible by integration" without
# this explicit grant.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rust_target: x86_64-pc-windows-msvc }
          - { os: macos-latest, rust_target: aarch64-apple-darwin }
          - { os: macos-13, rust_target: x86_64-apple-darwin }
          - { os: ubuntu-latest, rust_target: x86_64-unknown-linux-gnu }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev pkg-config build-essential \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code-signing secrets are wired in Phase 7. They live in repo
          # secrets and never appear in source.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Navis ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
